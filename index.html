<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Makao</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        div {z-index: 1;}
        canvas {
            /* Ustalamy sztywne proporcje logiczne gry (400x300 to proporcje 4/3) */
            aspect-ratio: 16 / 9;

            /* Gra zajmie max 90% szerokości lub wysokości, w zależności od tego, co skończy się pierwsze */
            max-width: 90vw;
            max-height: 90vh;

            /* Te dwie reguły współpracują z aspect-ratio, zapobiegając rozciąganiu */
            width: auto;
            height: auto;

            /* Opcjonalnie: wyłącza rozmycie pikseli */
            image-rendering: pixelated; 
            background: #000;
        }

    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1920" height="1080"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
